name: Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.5.0)"
        required: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Lint JSON files
        run: |
          for f in manifest.json package.json; do
            python3 -m json.tool "$f" > /dev/null && echo "$f: valid"
          done

      - name: Install dependencies
        run: npm ci

      - name: Lint addon
        run: npm run lint

      - name: Run tests
        run: npm test

  release:
    if: github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    env:
      VERSION: ${{ github.event.inputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Bump versions
        run: |
          npm version "$VERSION" --no-git-tag-version
          sed -i "s/\"version\": \".*\"/\"version\": \"$VERSION\"/" manifest.json

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json package-lock.json
          git commit -m "Release v$VERSION"
          git push

      - name: Package addon
        run: zip -r notion-favicon.zip manifest.json src/ icons/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: notion-favicon.zip

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v$VERSION" \
            notion-favicon.zip \
            --title "v$VERSION" \
            --target "$(git rev-parse HEAD)" \
            --generate-notes
